org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# The Kotlin compiler forks its own JVM and does NOT inherit org.gradle.jvmargs
# above. Left unset it picks a default that often fails to launch on Windows, and
# Gradle reports that as "Could not connect to Kotlin compile daemon" rather than
# as the out-of-memory it actually is. KSP runs the compiler too, which is why
# :app:kspDebugKotlin is usually the task that trips first.
kotlin.daemon.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# If the daemon still refuses to start, uncomment this. It runs the Kotlin
# compiler inside the Gradle daemon instead of forking one, which sidesteps the
# problem entirely at the cost of a slower first build. Antivirus blocking the
# local socket the daemon connects over is the usual reason it comes to this.
# kotlin.compiler.execution.strategy=in-process
